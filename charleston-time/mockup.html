<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charleston Time Block - Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: #f0f0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .block-container {
            max-width: 600px;
            width: 100%;
        }

        .wp-block-flex-perception-charleston-time .charleston-time-display {
            font-size: 2em;
            font-weight: bold;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="block-container">
        <div class="wp-block-flex-perception-charleston-time">
            <div class="charleston-time-display" id="time">
                Loading...
            </div>
        </div>
    </div>

    <script>
        function getCharlestonTime() {
            const now = new Date();
            const charlestonTime = new Date(
                now.toLocaleString('en-US', { timeZone: 'America/New_York' })
            );

            let hours = charlestonTime.getHours();
            const minutes = charlestonTime.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            hours = hours ? hours : 12;

            const minutesStr = minutes < 10 ? '0' + minutes : minutes;

            return `${hours}:${minutesStr}${ampm}`;
        }

        function updateTime() {
            document.getElementById('time').textContent = getCharlestonTime();
        }

        // Update immediately and then every minute
        updateTime();
        setInterval(updateTime, 60000);
    </script>
</body>
</html>
